<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Búhos CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#29ABE2;--bluedark:#1A8BBF;--bluelight:#E8F7FD;
  --amber:#F7A800;--amberdark:#C58600;--amberlight:#FEF5DC;
  --bg:#F4F6F8;--surface:#fff;--s2:#F0F4F7;--s3:#E4ECF1;
  --border:#DDE4EA;--border2:#C5D0D9;
  --text:#1A2530;--muted:#6B7E8F;--faint:#A8B8C4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}
.sidebar{width:56px;background:var(--blue);display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;gap:2px;flex-shrink:0;z-index:20;}
.sb-logo{margin-bottom:10px;padding:4px;cursor:pointer;}
.sb-item{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.65);transition:background .12s,color .12s;position:relative;}
.sb-item:hover{background:rgba(255,255,255,.15);color:#fff;}
.sb-item.active{background:rgba(255,255,255,.22);color:#fff;}
.sb-item .tip{position:absolute;left:48px;background:var(--text);color:#fff;font-size:11px;padding:4px 9px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100;}
.sb-item:hover .tip{opacity:1;}
.sb-spacer{flex:1;}
.sb-user{width:30px;height:30px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,.3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0;}
.ptabs{display:flex;}
.ptb{padding:0 13px;height:46px;line-height:46px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.ptb:hover{color:var(--text);}
.ptb.active{color:var(--blue);border-bottom-color:var(--blue);}
.btn-new{padding:7px 14px;font-size:12px;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:7px;cursor:pointer;}
.btn-new:hover{background:var(--bluedark);}
.workspace{display:flex;flex:1;overflow:hidden;}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;}
.kanban-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:12px;}
.kanban-board{display:flex;gap:9px;height:100%;min-width:max-content;}
.kcol{width:214px;background:var(--surface);border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.kcol-hd{padding:9px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.khl{display:flex;align-items:center;gap:7px;}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ctitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.ccount{font-size:10px;font-family:'DM Mono',monospace;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted);}
.kcards{padding:6px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.kcard:hover{border-color:var(--border2);box-shadow:0 2px 6px rgba(41,171,226,.08);}
.kcard.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(41,171,226,.15);}
.kc1{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.kpre{font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);}
.ktipo{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;}
.te{background:var(--bluelight);color:var(--bluedark);}
.tp{background:#F3EAFA;color:#7B3FA0;}
.kcli{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px;}
.kemp{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;}
.kdesc{font-size:11px;color:var(--muted);line-height:1.35;margin-bottom:6px;}
.kchips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.chip{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--s2);border:1px solid var(--border);color:var(--muted);}
.kfoot{display:flex;align-items:center;justify-content:space-between;}
.kdate{font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);}
.kbadges{display:flex;gap:4px;align-items:center;}
.cbadge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;}
.cg{background:#FDECEB;color:#C0392B;}.cw{background:#E1F5EE;color:#0F6E56;}.cll{background:var(--amberlight);color:var(--amberdark);}.cm{background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.kby{font-size:10px;color:var(--faint);font-style:italic;}
.empty-col{font-size:11px;color:var(--muted);text-align:center;padding:22px 8px;opacity:.4;font-style:italic;}
.panel{width:0;overflow:hidden;background:var(--surface);border-left:1px solid var(--border);transition:width .2s ease;flex-shrink:0;display:flex;flex-direction:column;}
.panel.open{width:375px;}
.phd{padding:13px 15px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ppre{font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);margin-bottom:3px;}
.prow{display:flex;justify-content:space-between;align-items:flex-start;}
.pcli{font-size:15px;font-weight:700;color:var(--text);}
.pemp{font-size:11px;color:var(--muted);margin-top:2px;}
.xbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;line-height:1;padding:0;margin-left:8px;}
.xbtn:hover{color:var(--text);}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.ptab{flex:1;padding:8px 0;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.05em;}
.ptab:hover{color:var(--text);}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue);}
.pbody{flex:1;overflow-y:auto;padding:13px 15px;}
.psec{margin-bottom:15px;}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:7px;}
.fpills{display:flex;flex-wrap:wrap;gap:4px;}
.fp{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:var(--s2);white-space:nowrap;}
.fp:hover{border-color:var(--border2);}
.fp.on0{background:var(--s3);border-color:#6B7E8F;color:#3A5060;}
.fp.on1{background:var(--amberlight);border-color:var(--amber);color:var(--amberdark);}
.fp.on2{background:var(--bluelight);border-color:var(--blue);color:var(--bluedark);}
.fp.on3{background:#E1F5EE;border-color:#0F6E56;color:#085041;}
.fp.on4{background:#F3EAFA;border-color:#7B3FA0;color:#4A1F6E;}
.fp.on5{background:#FDECEB;border-color:#C0392B;color:#7A1F17;}
.fp.on6{background:#E0F2EF;border-color:#2C7A6E;color:#1A4F49;}
.fp.on7{background:#EAF3DE;border-color:#3B6D11;color:#27500A;}
.fp.on8{background:#EEEDFE;border-color:#534AB7;color:#3C3489;}
.fp.on9{background:var(--s3);border-color:#6B7E8F;color:#3A5060;}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.icell{background:var(--s2);border-radius:7px;padding:8px 10px;}
.iclbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px;}
.icval{font-size:12px;color:var(--text);font-weight:600;}
.prodcard{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:7px;}
.prodname{font-size:12px;font-weight:700;margin-bottom:5px;color:var(--text);}
.prodspecs{display:flex;flex-wrap:wrap;gap:4px;}
.pspec{font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:2px 6px;color:var(--muted);}
.fsel{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;}
.fsel:focus{border-color:var(--blue);}
.hitem{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.hitem:last-child{border-bottom:none;}
.hdwrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px;}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hline{width:1px;background:var(--border);flex:1;margin-top:4px;}
.hbody{flex:1;}
.htxt{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:2px;}
.hmeta{font-size:10px;color:var(--muted);display:flex;gap:8px;}
.hnota{font-size:11px;color:var(--text);background:var(--bluelight);border-radius:5px;padding:6px 9px;margin-top:5px;line-height:1.45;border-left:2px solid var(--blue);}
.notawrap textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;resize:none;min-height:76px;background:var(--surface);color:var(--text);outline:none;}
.notawrap textarea:focus{border-color:var(--blue);}
.notafoot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.notahint{font-size:11px;color:var(--muted);}
.pfoot{padding:9px 15px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.spacer{flex:1;}
.bsm{padding:6px 13px;font-size:11px;font-weight:600;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
.bsm:hover{background:var(--s2);}
.bdanger{color:#C0392B;border-color:#f5c0bb;}.bdanger:hover{background:#FDECEB;}
.bprimary{background:var(--blue);color:#fff;border-color:var(--blue);}.bprimary:hover{background:var(--bluedark);}
.wov{display:none;position:fixed;inset:0;background:rgba(10,20,30,.55);z-index:200;align-items:flex-start;justify-content:center;padding-top:36px;overflow-y:auto;}
.wov.open{display:flex;}
.wmod{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:600px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.2);margin-bottom:40px;}
.whd{padding:1.25rem 1.5rem 0;}
.wsteps{display:flex;gap:3px;margin-bottom:.7rem;}
.wst{flex:1;height:3px;background:var(--s3);border-radius:2px;transition:background .2s;}
.wst.done{background:var(--blue);}
.wst.cur{background:var(--blue);opacity:.45;}
.wslbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.3rem;}
.wtitle{font-size:16px;font-weight:700;margin-bottom:1rem;color:var(--text);}
.wbody{padding:0 1.5rem;}
.wfoot{padding:.875rem 1.5rem 1.25rem;display:flex;gap:8px;justify-content:space-between;border-top:1px solid var(--border);margin-top:1rem;}
.fg{margin-bottom:10px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);}
.fg textarea{min-height:62px;resize:vertical;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.pwiz{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:10px;}
.pwiz-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.pwiz-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.bxdel{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:0;}.bxdel:hover{color:#C0392B;}
.btn-addp{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:12px;font-weight:600;border:1.5px dashed var(--border2);border-radius:8px;background:none;cursor:pointer;color:var(--muted);width:100%;justify-content:center;margin-top:4px;font-family:'DM Sans',sans-serif;}
.btn-addp:hover{background:var(--s2);color:var(--blue);border-color:var(--blue);}
.psearch{position:relative;}
.psinp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;}
.psinp:focus{border-color:var(--blue);}
.psdrop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:9px;box-shadow:0 8px 28px rgba(0,0,0,.13);z-index:400;max-height:200px;overflow-y:auto;display:none;}
.psdrop.open{display:block;}
.psitem{padding:8px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.psitem:hover{background:var(--bluelight);}
.psname{color:var(--text);font-weight:500;}
.pscode{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);}
.psnew{padding:9px 11px;font-size:12px;cursor:pointer;color:var(--blue);font-weight:700;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.psnew:hover{background:var(--bluelight);}
.psempty{padding:11px;font-size:12px;color:var(--muted);text-align:center;}
.pstag{display:inline-flex;align-items:center;gap:5px;background:var(--bluelight);border:1px solid var(--blue);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--bluedark);margin-bottom:7px;}
.pstag button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:13px;padding:0;line-height:1;}
.mview{padding:1.25rem;overflow-y:auto;flex:1;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.mlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px;}
.mval{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.msub{font-size:11px;color:var(--muted);margin-top:3px;}
.mcard.accent .mval{color:var(--blue);}

/* ── COTIZADOR ── */
.cot-mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cot-mode-btn{padding:14px 10px;border:1.5px solid var(--border);border-radius:9px;background:var(--s2);cursor:pointer;text-align:center;transition:all .12s;font-family:'DM Sans',sans-serif;}
.cot-mode-btn:hover{border-color:var(--blue);background:var(--bluelight);}
.cot-mode-btn.sel{border-color:var(--blue);background:var(--bluelight);}
.cot-mode-icon{font-size:22px;margin-bottom:4px;}
.cot-mode-label{font-size:11px;font-weight:700;color:var(--text);}
.cot-mode-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.upload-zone{border:2px dashed var(--border2);border-radius:9px;padding:1.5rem;text-align:center;cursor:pointer;background:var(--s2);transition:all .12s;}
.upload-zone:hover{border-color:var(--blue);background:var(--bluelight);}
.upload-zone input{display:none;}
.ai-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:7px;font-size:11px;font-weight:600;margin-top:8px;}
.ai-bar.idle{background:var(--s2);color:var(--muted);}
.ai-bar.loading{background:var(--amberlight);color:var(--amberdark);}
.ai-bar.ok{background:#E1F5EE;color:#0F6E56;}
.ai-bar.err{background:#FDECEB;color:#C0392B;}
.ai-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ai-bar.idle .ai-dot{background:var(--faint);}
.ai-bar.loading .ai-dot{background:var(--amber);animation:aipulse .7s infinite;}
.ai-bar.ok .ai-dot{background:#0F6E56;}
.ai-bar.err .ai-dot{background:#C0392B;}
@keyframes aipulse{0%,100%{opacity:1}50%{opacity:.2}}
.cot-items-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.cot-items-table th{padding:5px 6px;border-bottom:2px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:left;}
.cot-items-table td{padding:4px 5px;border-bottom:1px solid var(--border);}
.cot-items-table input,.cot-items-table textarea{width:100%;padding:3px 5px;border:1px solid transparent;border-radius:4px;font-size:11px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text);outline:none;}
.cot-items-table input:focus,.cot-items-table textarea:focus{border-color:var(--blue);background:var(--bluelight);}
.cot-items-table .nr{text-align:right;}
.cot-items-table input.nr{text-align:right;}
.cot-total-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
.cot-total-row.final{font-weight:700;font-size:13px;color:var(--blue);border-top:2px solid var(--border);padding-top:6px;margin-top:4px;}
.cot-preview-wrap{background:var(--s3);border-radius:8px;padding:10px;margin-top:10px;max-height:340px;overflow-y:auto;}
.cot-preview-inner{background:#fff;font-family:Arial,sans-serif;font-size:11px;color:#222;padding:16px;border-radius:4px;min-height:200px;}
.send-section{background:var(--s2);border-radius:9px;padding:12px;border:1px solid var(--border);}
.apikey-row{display:flex;gap:6px;margin-bottom:8px;}
.apikey-row input{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;background:var(--surface);color:var(--text);outline:none;}
.apikey-row input:focus{border-color:var(--blue);}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo">
    <svg width="32" height="36" viewBox="0 0 32 36" fill="none">
      <ellipse cx="16" cy="18" rx="13" ry="14" fill="white" opacity=".15"/>
      <circle cx="11" cy="16" r="5" fill="white" opacity=".9"/>
      <circle cx="21" cy="16" r="5" fill="white" opacity=".9"/>
      <circle cx="11" cy="16" r="2.5" fill="#29ABE2"/>
      <circle cx="21" cy="16" r="2.5" fill="#29ABE2"/>
      <circle cx="11.8" cy="15.2" r="1" fill="white"/>
      <circle cx="21.8" cy="15.2" r="1" fill="white"/>
      <polygon points="16,7 14,11 18,11" fill="#F7A800"/>
      <ellipse cx="16" cy="23" rx="8" ry="4" fill="white" opacity=".6"/>
      <path d="M5 18 Q3 22 5 26 Q8 28 10 26" fill="white" opacity=".35"/>
      <path d="M27 18 Q29 22 27 26 Q24 28 22 26" fill="white" opacity=".35"/>
    </svg>
  </div>
  <div class="sb-item active" onclick="showView('pipeline',this)">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="11" rx="1.5"/><rect x="14" y="17" width="7" height="4" rx="1.5"/></svg>
    <span class="tip">Pipeline</span>
  </div>
  <div class="sb-item" onclick="showView('metricas',this)">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="tip">Métricas</span>
  </div>
  <div class="sb-spacer"></div>
  <div class="sb-user" title="Daisy Herrera">DH</div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="ptabs" id="ptabs">
      <div class="ptb active" onclick="setPipe('comercial',this)">Comercial</div>
      <div class="ptb" onclick="setPipe('produccion',this)">Producción</div>
      <div class="ptb" onclick="setPipe('todo',this)">Todo</div>
    </div>
    <button class="btn-new" onclick="openWizard()">+ Nueva cotización</button>
  </div>

  <div id="view-pipeline" class="view active">
    <div class="workspace">
      <div class="kanban-wrap"><div class="kanban-board" id="board"></div></div>
      <div class="panel" id="panel">
        <div class="phd">

        <div class="notafoot"><span class="notahint">Se registrará como ${currentUser}</span><button class="bsm bprimary" onclick="guardarNota()">Guardar nota</button></div>
      </div>
    </div>
    <div class="psec"><div class="slbl">Notas anteriores</div>${prev||'<div style="font-size:12px;color:var(--muted);font-style:italic">Sin notas aún</div>'}</div>`;
}

function guardarNota(){
  const txt=document.getElementById('nota-txt').value.trim();if(!txt)return;
  const c=data.find(x=>x.id===selId);if(!c)return;
  const ts=new Date().toISOString().slice(0,16).replace('T',' ');
  c.historial.push({ts,tipo:'nota',txt,autor:currentUser,color:'#F7A800'});
  renderNotas(c);
}

function setFase(fid,ci){
  const c=data.find(x=>x.id===selId);if(!c)return;
  c.fase=fid;
  const ts=new Date().toISOString().slice(0,16).replace('T',' ');
  c.historial.push({ts,tipo:'fase',txt:`Fase → ${gf(fid).n}`,autor:currentUser,color:gf(fid).c});
  if(fid===3)c.historial.push({ts,tipo:'auto',txt:'Cotización enviada al cliente',autor:'Sistema',color:'#0F6E56'});
  if(fid===4)c.historial.push({ts,tipo:'auto',txt:'Cotización aprobada por el cliente',autor:'Sistema',color:'#7B3FA0'});
  if(fid===8)c.historial.push({ts,tipo:'auto',txt:'Diseño aprobado — pasando a terminados',autor:'Sistema',color:'#534AB7'});
  renderPBody(c);renderBoard();
}

function updDis(v){
  const c=data.find(x=>x.id===selId);if(!c)return;
  if(v&&v!==c.disenador){
    const ts=new Date().toISOString().slice(0,16).replace('T',' ');
    c.historial.push({ts,tipo:'auto',txt:`Diseñador asignado: ${v}`,autor:currentUser,color:'#29ABE2'});
  }
  c.disenador=v;
}

function rpw(i){
  const p=wData.productos[i];
  const tag=p.prod?`<div class="pstag">${p.prod.n} <span style="font-size:10px;opacity:.7">${p.prod.c}</span> <button onclick="clrP(${i})">×</button></div>`:'';

function srchP(i,q){
  const d=document.getElementById('pd-'+i);d.classList.add('open');

  const nw=q.trim()?`<div class="psnew" onclick="newP(${i},'${q.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">+ Crear "<strong>${q}</strong>" como producto nuevo</div>`:'';
  d.innerHTML=r.map(p=>`<div class="psitem" onclick="selP(${i},'${p.c}','${p.n.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"><span class="psname">${p.n}</span><span class="pscode">${p.c}</span></div>`).join('')+(r.length===0?'<div class="psempty">Sin resultados en catálogo</div>':'')+nw;
}

function selP(i,code,name){svPF(i);wData.productos[i].prod={c:code,n:name};document.getElementById('plist').innerHTML=wData.productos.map((_,j)=>rpw(j)).join('');}

let cotMode = 'none'; // 'foto' | 'manual'
let cotItems = [];
let cotImgB64 = null;

function renderCotizacion(c) {
  const tieneItems = c.cotItems && c.cotItems.length > 0;
  const enCotizacion = c.fase === 2;
  const enviada = c.fase >= 3;

  // Precargar items de la orden si no hay cotización aún
  if (!c.cotItems) {
    c.cotItems = c.productos.map(p => ({
      codigo: p.prod.c,
      desc: p.prod.n + (p.obs ? '\n' + p.obs : ''),
      cant: p.cant,
      unitario: 0,
      iva: 19
    }));
    if (!c.cotItems.length) c.cotItems = [{codigo:'',desc:'',cant:1,unitario:0,iva:19}];
    c.cotNum = c.cotNum || ('C-1-' + Math.floor(6000 + Math.random()*3000));
    c.cotVigencia = c.cotVigencia || '15';
    c.cotPago = c.cotPago || '50% de Anticipo y 50% Para despacho';
    c.cotEmail = c.cotEmail || '';
    c.cotMensaje = c.cotMensaje || 'Con gusto presentamos nuestra cotización según su solicitud. Esperamos ser un gran aliado en este importante proyecto y dar forma a sus ideas.';
  }

  const apiKey = localStorage.getItem('buhos_api_key') || '';

  document.getElementById('pbody').innerHTML = `
    <div class="psec">
      ${enCotizacion ? `
        <div class="slbl" style="margin-bottom:8px">Crear cotización</div>
        <div class="cot-mode-btns">
          <div class="cot-mode-btn${cotMode==='foto'?' sel':''}" onclick="setCotMode('foto')">
            <div class="cot-mode-icon">📷</div>
            <div class="cot-mode-label">Subir foto</div>
            <div class="cot-mode-sub">Claude transcribe</div>
          </div>
          <div class="cot-mode-btn${cotMode==='manual'?' sel':''}" onclick="setCotMode('manual')">
            <div class="cot-mode-icon">✏️</div>
            <div class="cot-mode-label">Manual</div>
            <div class="cot-mode-sub">Llenar formulario</div>
          </div>
        </div>
        ${cotMode==='foto' ? renderFotoZone(apiKey) : ''}
        ${cotMode==='manual' || tieneItems ? renderCotForm(c) : ''}
      ` : `
        <div class="slbl" style="margin-bottom:8px">Cotización</div>
        ${renderCotForm(c)}
      `}
    </div>

}

function renderFotoZone(apiKey) {
  return `
    <div style="margin-bottom:10px">
      <div class="slbl" style="margin-bottom:5px">API Key de Claude</div>
      <div class="apikey-row">
        <input type="password" id="cot-apikey" placeholder="sk-ant-..." value="${apiKey}" oninput="localStorage.setItem('buhos_api_key',this.value)"/>
      </div>
    </div>

function renderCotForm(c) {
  const items = c.cotItems || [];
  const subtotal = items.reduce((s,i) => s + (parseFloat(i.cant)||0)*(parseFloat(i.unitario)||0), 0);
  const iva = items.reduce((s,i) => s + (parseFloat(i.cant)||0)*(parseFloat(i.unitario)||0)*(parseFloat(i.iva)||0)/100, 0);
  const total = subtotal + iva;
  const fmt = n => Math.round(n).toLocaleString('es-CO');

  const filas = items.map((it,i) => `
    <tr>
      <td><input value="${it.codigo||''}" onchange="updCotItem(${i},'codigo',this.value)" style="width:62px"/></td>
      <td><textarea rows="2" onchange="updCotItem(${i},'desc',this.value)" style="width:100%;min-width:80px">${it.desc||''}</textarea></td>
      <td><input type="number" class="nr" value="${it.cant||1}" onchange="updCotItem(${i},'cant',this.value)" style="width:44px"/></td>
      <td><input type="number" class="nr" value="${it.unitario||''}" placeholder="0" onchange="updCotItem(${i},'unitario',this.value)" style="width:72px"/></td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap">${fmt((parseFloat(it.cant)||0)*(parseFloat(it.unitario)||0))}</td>
      <td><input type="number" class="nr" value="${it.iva||19}" onchange="updCotItem(${i},'iva',this.value)" style="width:38px"/></td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap">${fmt((parseFloat(it.cant)||0)*(parseFloat(it.unitario)||0)*(1+(parseFloat(it.iva)||0)/100))}</td>
      <td><button class="bsm bdanger" style="padding:2px 6px;font-size:11px" onclick="delCotItem(${i})">×</button></td>
    </tr>`).join('');

  return `
    <div class="slbl" style="margin-bottom:6px">N° Cotización</div>
    <div class="fg" style="margin-bottom:8px"><input id="cot-num" value="${c.cotNum||''}" style="font-family:'DM Mono',monospace;font-size:12px" onchange="updCotField('cotNum',this.value)"/></div>
    <div class="slbl" style="margin-bottom:6px">Ítems</div>
    <div style="overflow-x:auto">
      <table class="cot-items-table">
        <thead><tr><th>Código</th><th>Descripción</th><th>Cant</th><th>Vr. Unit</th><th>Vr. Bruto</th><th>IVA%</th><th>Vr. Total</th><th></th></tr></thead>
        <tbody id="cot-items-body">${filas}</tbody>
      </table>
    </div>

function setCotMode(mode) {
  cotMode = mode;
  if (mode === 'foto') cotImgB64 = null;
  const c = data.find(x => x.id === selId);
  if (c) renderCotizacion(c);
}

function handleCotImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    cotImgB64 = ev.target.result.split(',')[1];
    const c = data.find(x => x.id === selId);
    if (c) renderCotizacion(c);
  };
  reader.readAsDataURL(file);
}

async function transcribir() {
  const apiKey = document.getElementById('cot-apikey')?.value || localStorage.getItem('buhos_api_key');
  if (!apiKey) { alert('Ingresa tu API key de Claude primero.'); return; }
  if (!cotImgB64) { alert('Sube una imagen primero.'); return; }

  setAiStatus('loading', 'Leyendo cotización con Claude...');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: cotImgB64 } },
            { type: 'text', text: `Extrae la información de esta cotización y responde SOLO con JSON válido, sin texto adicional, sin backticks:
{"num":"número de cotización","items":[{"codigo":"código","desc":"descripción completa","cant":cantidad_número,"unitario":precio_unitario_número,"iva":19}],"vigencia":"15","pago":"forma de pago"}
Si no encuentras algún campo déjalo vacío o en 0.` }
          ]
        }]
      })
    });

    const data2 = await resp.json();
    if (data2.error) throw new Error(data2.error.message);

    const txt = data2.content[0].text.trim();
    const parsed = JSON.parse(txt);

    const c = data.find(x => x.id === selId);
    if (!c) return;

    if (parsed.num) c.cotNum = parsed.num;
    if (parsed.items?.length) c.cotItems = parsed.items.map(it => ({
      codigo: it.codigo || '',
      desc: it.desc || '',
      cant: parseFloat(it.cant) || 1,
      unitario: parseFloat(it.unitario) || 0,
      iva: parseFloat(it.iva) || 19
    }));
    if (parsed.vigencia) c.cotVigencia = parsed.vigencia;
    if (parsed.pago) c.cotPago = parsed.pago;

    const ts = new Date().toISOString().slice(0,16).replace('T',' ');
    c.historial.push({ ts, tipo:'auto', txt:'Cotización transcrita desde foto con IA', autor:'Sistema', color:'#F7A800' });

    cotMode = 'manual';
    setAiStatus('ok', 'Cotización transcrita correctamente');
    renderCotizacion(c);

  } catch(err) {
    setAiStatus('err', 'Error: ' + err.message);
  }
}

function setAiStatus(estado, msg) {
  const el = document.getElementById('ai-status');
  const msgEl = document.getElementById('ai-msg');
  if (!el || !msgEl) return;
  el.className = 'ai-bar ' + estado;
  msgEl.textContent = msg;
}

function updCotItem(i, campo, val) {
  const c = data.find(x => x.id === selId);
  if (!c?.cotItems?.[i]) return;
  c.cotItems[i][campo] = ['cant','unitario','iva'].includes(campo) ? parseFloat(val)||0 : val;
  renderCotizacion(c);
}

function updCotField(campo, val) {
  const c = data.find(x => x.id === selId);
  if (c) c[campo] = val;
}

function addCotItem() {
  const c = data.find(x => x.id === selId);
  if (!c) return;
  if (!c.cotItems) c.cotItems = [];
  c.cotItems.push({ codigo:'', desc:'', cant:1, unitario:0, iva:19 });
  renderCotizacion(c);
}

function delCotItem(i) {
  const c = data.find(x => x.id === selId);
  if (!c?.cotItems) return;
  c.cotItems.splice(i, 1);
  renderCotizacion(c);
}

function verPreview() {
  const c = data.find(x => x.id === selId);
  if (!c) return;
  const html = buildCotHTML(c);
  const win = window.open('', '_blank', 'width=860,height=700,scrollbars=yes');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cotización ${c.cotNum||''}</title></head><body style="margin:0;background:#f4f4f4"><div style="max-width:820px;margin:20px auto;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.1);border-radius:6px;overflow:hidden">${html}</div></body></html>`);
  win.document.close();
}

async function enviarGmail() {
  const c = data.find(x => x.id === selId);
  if (!c) return;
  const email = c.cotEmail || document.getElementById('cot-email')?.value;
  if (!email) { alert('Ingresa el email del cliente.'); return; }

  setGmailStatus('loading', 'Preparando email...');

  const html = buildCotHTML(c);
  const asunto = `Cotización ${c.cotNum||''} - Búhos Editores`;
  const body = `
    <div style="font-family:Arial,sans-serif;background:#f4f6f8;padding:20px">
      <div style="max-width:820px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)">
        ${html}
      </div>
      <div style="text-align:center;margin-top:16px;font-size:11px;color:#888">
        Este correo fue enviado desde el CRM de Búhos Editores · buhosedi@gmail.com
      </div>
    </div>`;

  // Construir mailto como fallback mientras se configura OAuth
  const mailtoUrl = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(email)}&su=${encodeURIComponent(asunto)}&body=${encodeURIComponent('Por favor revise la cotización adjunta en este email.')}`;

  // Registrar en historial
  const ts = new Date().toISOString().slice(0,16).replace('T',' ');
  c.historial.push({ ts, tipo:'auto', txt:`Cotización ${c.cotNum||''} enviada a ${email}`, autor:currentUser, color:'#0F6E56' });
  c.fase = Math.max(c.fase, 3);

  setGmailStatus('ok', `Email preparado para ${email}`);

  // Abrir Gmail con el email prellenado
  window.open(mailtoUrl, '_blank');

  renderBoard();
  renderCotizacion(c);

  // Nota: con OAuth real de Gmail API, aquí iría el envío programático
  // Por ahora abre Gmail con los datos prellenados
}
